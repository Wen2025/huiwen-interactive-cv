<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Huiwen Ge</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --neon-green: #39ff14;
      --neon-orange: #ff6a00;
      --neon-purple: #bf00ff;
      --neon-pink: #ff007f;
      --dark: #0a0a0a;
    }
    html, body { width: 100%; height: 100%; background: var(--dark); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

    .back { position: fixed; top: 1.2rem; left: 1.5rem; font-size: 15px; font-weight: 700; color: #ffffff; text-decoration: none; letter-spacing: 0.1em; z-index: 100; transition: color 0.3s; }
    .back:hover { color: var(--neon-green); }
    .watermark { position: fixed; bottom: 1.2rem; right: 1.5rem; font-size: 11px; color: #666; letter-spacing: 0.2em; z-index: 100; pointer-events: none; }

    /* ── SWITCH SCREEN ── */
    #switch-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50;
      background: var(--dark);
      transition: opacity 0.8s ease;
    }

    /* Warm glow background — on from the start */
    #switch-screen::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 38%, rgba(255,200,80,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .ceiling-mount { width: 60px; height: 12px; background: linear-gradient(180deg, #2a2a2a, #1a1a1a); border-radius: 4px 4px 0 0; border: 1px solid #333; border-bottom: none; }
    .wire { width: 2px; height: 60px; background: linear-gradient(180deg, #444, #666); margin: 0 auto; }
    .socket { width: 32px; height: 24px; background: linear-gradient(180deg, #2a2a2a, #1a1a1a); border: 1px solid #333; border-radius: 4px 4px 0 0; margin: 0 auto; }

    /* Bulb — already ON from start */
    .bulb { width: 70px; height: 80px; margin: 0 auto; }
    .bulb svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 12px #ffe066) drop-shadow(0 0 30px #ffaa00) drop-shadow(0 0 70px #ff8800);
    }
    .bulb-glass { fill: #fff5cc; }
    .bulb-filament { stroke: #ff9900; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .bulb-base { fill: #2a2a2a; stroke: #333; stroke-width: 0.5; }

    /* Cord */
    .cord-container { display: flex; flex-direction: column; align-items: center; cursor: pointer; margin-top: 4px; }
    .cord { width: 2px; height: 110px; background: linear-gradient(180deg, #666, #999, #777); margin: 0 auto; transition: height 0.12s ease; }
    .cord.pulled { height: 140px; }
    .cord-knot { width: 14px; height: 14px; background: radial-gradient(circle at 40% 35%, #bbb, #666); border-radius: 50%; border: 1px solid #777; box-shadow: 0 2px 6px rgba(0,0,0,0.6); }

    .switch-hint { margin-top: 1.8rem; font-size: 11px; color: #aaa; letter-spacing: 0.25em; text-transform: uppercase; animation: pulse-hint 2s ease-in-out infinite; }
    @keyframes pulse-hint { 0%,100% { color: #888; } 50% { color: #ccc; } }

    /* ── PANELS ── */
    #panels {
      position: fixed; inset: 0;
      display: flex; flex-direction: row;
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s;
    }
    #panels.active { opacity: 1; pointer-events: all; }

    .panel {
      flex: 1; position: relative;
      border-right: 1px solid #1c1c1c;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden;
      background: #080808;
    }
    .panel:last-child { border-right: none; }

    /* Scanlines */
    .panel::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
      pointer-events: none; z-index: 1;
    }

    /* Warm ambient glow */
    .panel-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,210,100,0.06) 0%, transparent 60%);
    }

    .panel-word {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 5vw, 72px);
      letter-spacing: 0.2em;
      color: #ffffff;
      position: relative; z-index: 2;
      transition: color 0.35s, text-shadow 0.35s;
      user-select: none;
    }

    /* Neon hover per panel */
    .panel[data-cat="brand"]:hover .panel-word {
      color: var(--neon-green);
      text-shadow: 0 0 8px var(--neon-green), 0 0 25px var(--neon-green), 0 0 60px var(--neon-green);
    }
    .panel[data-cat="print"]:hover .panel-word {
      color: var(--neon-orange);
      text-shadow: 0 0 8px var(--neon-orange), 0 0 25px var(--neon-orange), 0 0 60px var(--neon-orange);
    }
    .panel[data-cat="digital"]:hover .panel-word {
      color: var(--neon-purple);
      text-shadow: 0 0 8px var(--neon-purple), 0 0 25px var(--neon-purple), 0 0 60px var(--neon-purple);
    }
    .panel[data-cat="web"]:hover .panel-word {
      color: var(--neon-pink);
      text-shadow: 0 0 8px var(--neon-pink), 0 0 25px var(--neon-pink), 0 0 60px var(--neon-pink);
    }

    .panel-enter {
      position: absolute; bottom: 1.5rem;
      font-size: 10px; letter-spacing: 0.25em;
      color: #888; z-index: 2; text-transform: uppercase;
      transition: color 0.3s;
    }
    .panel:hover .panel-enter { color: #ccc; }

    .panel-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 10; transition: opacity 0.15s; }
    .panel.flash .panel-flash { opacity: 0.07; }

    /* Spotlight canvas */
    #spotlight-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 3; opacity: 0; transition: opacity 1.5s; }
    #spotlight-canvas.active { opacity: 1; }

    @media (max-width: 768px) {
      #panels { flex-direction: column; }
      .panel { border-right: none; border-bottom: 1px solid #1c1c1c; }
      .panel:last-child { border-bottom: none; }
      .panel-word { font-size: clamp(42px, 12vw, 68px); }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← CV</a>
  <div class="watermark">HUIWEN GE</div>

  <!-- SWITCH SCREEN -->
  <div id="switch-screen">
    <div class="ceiling-mount"></div>
    <div class="wire"></div>
    <div class="socket"></div>
    <div class="bulb">
      <svg viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
        <path class="bulb-glass" d="M35 4 C18 4 8 17 8 30 C8 43 16 52 24 58 L24 66 C24 68 26 70 28 70 L42 70 C44 70 46 68 46 66 L46 58 C54 52 62 43 62 30 C62 17 52 4 35 4 Z"/>
        <rect class="bulb-base" x="24" y="66" width="22" height="3" rx="1"/>
        <rect class="bulb-base" x="24" y="70" width="22" height="3" rx="1" fill="#222"/>
        <rect class="bulb-base" x="26" y="73" width="18" height="3" rx="1" fill="#1a1a1a"/>
        <polyline class="bulb-filament" points="30,55 30,35 35,28 40,35 40,55" stroke-width="1.5"/>
        <line class="bulb-filament" x1="30" y1="35" x2="35" y2="38" stroke-width="1"/>
        <line class="bulb-filament" x1="40" y1="35" x2="35" y2="38" stroke-width="1"/>
      </svg>
    </div>
    <div class="cord-container" onclick="activatePortfolio()">
      <div class="cord" id="cord"></div>
      <div class="cord-knot"></div>
    </div>
    <div class="switch-hint">pull the cord</div>
  </div>

  <canvas id="spotlight-canvas"></canvas>

  <div id="panels">
    <div class="panel" data-cat="brand" onclick="goTo('portfolio-brand.html', this)">
      <div class="panel-glow"></div>
      <div class="panel-word">Brand</div>
      <div class="panel-enter">enter →</div>
      <div class="panel-flash"></div>
    </div>
    <div class="panel" data-cat="print" onclick="goTo('portfolio-print.html', this)">
      <div class="panel-glow"></div>
      <div class="panel-word">Print</div>
      <div class="panel-enter">enter →</div>
      <div class="panel-flash"></div>
    </div>
    <div class="panel" data-cat="digital" onclick="goTo('portfolio-digital.html', this)">
      <div class="panel-glow"></div>
      <div class="panel-word">Digital</div>
      <div class="panel-enter">enter →</div>
      <div class="panel-flash"></div>
    </div>
    <div class="panel" data-cat="web" onclick="goTo('portfolio-web.html', this)">
      <div class="panel-glow"></div>
      <div class="panel-word">Web</div>
      <div class="panel-enter">enter →</div>
      <div class="panel-flash"></div>
    </div>
  </div>

  <script>
    function playPull() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / ctx.sampleRate;
          data[i] = (Math.random() * 2 - 1) * Math.exp(-t / 0.02) * 0.5;
          data[i] += Math.sin(2 * Math.PI * 70 * t) * Math.exp(-t / 0.05) * 0.5;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.6, 0);
        src.connect(gain); gain.connect(ctx.destination); src.start();
      } catch(e) {}
    }

    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.01));
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.3, 0);
        src.connect(gain); gain.connect(ctx.destination); src.start();
      } catch(e) {}
    }

    const canvas = document.getElementById('spotlight-canvas');
    const sctx = canvas.getContext('2d');
    let W, H;
    function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let spotX, spotY, targetX, targetY, animating = false;
    function animateSpotlight() {
      if (!animating) return;
      sctx.clearRect(0, 0, W, H);
      sctx.fillStyle = 'rgba(8,8,8,0.55)';
      sctx.fillRect(0, 0, W, H);
      const r = Math.max(W, H) * 0.3;
      const grad = sctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, r);
      grad.addColorStop(0, 'rgba(255,235,160,0.12)');
      grad.addColorStop(0.4, 'rgba(255,210,80,0.04)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      sctx.globalCompositeOperation = 'destination-out';
      sctx.fillStyle = grad;
      sctx.beginPath(); sctx.arc(spotX, spotY, r, 0, Math.PI * 2); sctx.fill();
      sctx.globalCompositeOperation = 'source-over';
      spotX += (targetX - spotX) * 0.025;
      spotY += (targetY - spotY) * 0.025;
      if (Math.random() < 0.007) { targetX = W * 0.1 + Math.random() * W * 0.8; targetY = H * 0.1 + Math.random() * H * 0.8; }
      requestAnimationFrame(animateSpotlight);
    }

    function showPanels() {
      document.getElementById('switch-screen').style.display = 'none';
      document.getElementById('panels').classList.add('active');
      canvas.classList.add('active');
      spotX = W / 2; spotY = H / 2; targetX = W * 0.3; targetY = H * 0.4;
      animating = true;
      animateSpotlight();
      document.querySelectorAll('.panel').forEach((p, i) => {
        setTimeout(() => p.classList.add('lit'), i * 100);
      });
    }

    let activated = false;
    function activatePortfolio() {
      if (activated) return;
      activated = true;
      playPull();
      const cord = document.getElementById('cord');
      cord.classList.add('pulled');
      setTimeout(() => cord.classList.remove('pulled'), 180);
      setTimeout(() => {
        const screen = document.getElementById('switch-screen');
        screen.style.opacity = '0';
        screen.style.pointerEvents = 'none';
        setTimeout(() => showPanels(), 700);
      }, 350);
    }

    function goTo(url, el) {
      playClick();
      el.classList.add('flash');
      setTimeout(() => { window.location.href = url; }, 220);
    }

    // If coming back from a category page, skip the switch animation
    if (window.location.hash === '#panels') {
      window.addEventListener('load', () => {
        activated = true;
        showPanels();
      });
    }
  </script>
</body>
</html>
